name: Publish macOS Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override, for example 1.3.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned macOS package
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "$VERSION" && "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          args=(--arch "${{ matrix.arch }}")
          if [[ -n "$VERSION" ]]; then
            args+=(--version "$VERSION")
          fi
          bash publish/mac/publish-mac.sh "${args[@]}"

      - name: Validate DMG package
        run: |
          set -euo pipefail
          dmg_path="publish/output/HiBrowser.dmg"
          mount_path="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_path" -force >/dev/null 2>&1 || true
            rm -rf "$mount_path"
          }
          trap cleanup EXIT
          echo "Validating: $dmg_path"
          test -f "$dmg_path"
          hdiutil attach -readonly -nobrowse -mountpoint "$mount_path" "$dmg_path"
          app_path="$mount_path/Hi Browser.app"
          test -x "$app_path/Contents/MacOS/ant-chrome"
          test -x "$app_path/Contents/MacOS/bin/xray"
          test -x "$app_path/Contents/MacOS/bin/sing-box"
          plutil -lint "$app_path/Contents/Info.plist"
          codesign --verify --deep --strict "$app_path"
          test -L "$mount_path/Applications"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ant-browser-macos-${{ matrix.arch }}
          path: publish/output/HiBrowser.dmg
          if-no-files-found: error

  release:
    name: Publish macOS Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare architecture-specific DMG names
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp release-artifacts/ant-browser-macos-arm64/HiBrowser.dmg release-assets/HiBrowser-arm64.dmg
          cp release-artifacts/ant-browser-macos-amd64/HiBrowser.dmg release-assets/HiBrowser-amd64.dmg

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --generate-notes || gh release view "$TAG_NAME" >/dev/null
          fi
          gh release upload "$TAG_NAME" release-assets/* --clobber
