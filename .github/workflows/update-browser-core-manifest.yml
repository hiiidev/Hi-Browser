name: Update Browser Core Manifest

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/update-browser-core-manifest.yml
      - tools/browsercore/update_manifest.py
      - browser-core-manifest.json
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: browser-core-manifest
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Generate manifest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 tools/browsercore/update_manifest.py \
            --repository adryfish/fingerprint-chromium \
            --limit 10 \
            --output browser-core-manifest.json
          cp browser-core-manifest.json "$RUNNER_TEMP/browser-core-manifest.json"

      - name: Validate manifest
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          manifest = json.load(open("browser-core-manifest.json", encoding="utf-8"))
          assert manifest["schemaVersion"] == 1
          assert manifest["provider"] == "fingerprint-chromium-static"
          assert manifest["releases"]
          for release in manifest["releases"]:
              assert release["tagName"]
              assert release["assets"]
              for asset in release["assets"]:
                  assert asset["downloadUrl"].startswith("https://")
          PY

      - name: Publish manifest branch
        env:
          TARGET_BRANCH: browser-core-index
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin "refs/heads/$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin \
              "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
            git switch --force-create "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git switch --orphan "$TARGET_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "$RUNNER_TEMP/browser-core-manifest.json" browser-core-manifest.json
          git add browser-core-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest is unchanged"
            exit 0
          fi
          git commit -m "chore(browser-core): update static manifest"
          if ! push_output="$(git push origin "HEAD:refs/heads/$TARGET_BRANCH" 2>&1)"; then
            echo "$push_output" >&2
            annotation="${push_output//'%'/'%25'}"
            annotation="${annotation//$'\r'/'%0D'}"
            annotation="${annotation//$'\n'/'%0A'}"
            echo "::error title=Manifest branch push failed::$annotation"
            exit 1
          fi
          echo "$push_output"
